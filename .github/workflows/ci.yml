name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git clone --depth 1 https://github.com/kotoba-lang/sprite-gpu.git ../sprite-gpu
      - run: git clone --depth 1 https://github.com/kotoba-lang/sprite2d.git ../sprite2d
      - run: git clone --depth 1 https://github.com/kotoba-lang/text.git ../text
      - run: git clone --depth 1 https://github.com/kotoba-lang/wgsl.git ../wgsl
      - run: git clone --depth 1 https://github.com/kotoba-lang/expr.git ../expr
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test
