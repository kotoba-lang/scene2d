name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # kotoba.scene2d now requires kami.sprite-gpu and kami.text (both
      # kotoba-lang/webgpu) directly instead of the standalone
      # kotoba-lang/sprite-gpu and kotoba-lang/text repos — see README.md.
      - run: git clone --depth 1 https://github.com/kotoba-lang/webgpu.git ../webgpu
      - run: git clone --depth 1 https://github.com/kotoba-lang/org-w3-webgpu.git ../org-w3-webgpu
      - run: git clone --depth 1 https://github.com/kotoba-lang/expr.git ../expr
      - run: git clone --depth 1 https://github.com/kotoba-lang/sprite2d.git ../sprite2d
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: clojure -M:test
